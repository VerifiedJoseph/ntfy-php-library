version: "3"

services:
  ntfy:
    container_name: ci_ntfy
    image: binwiederhier/ntfy:v2.23.0@sha256:b32b4221a64ec2e7c000f0782b2feef24022e1a09a24e531640f4cbba6cfa1e6
    command: serve
    volumes:
     - './ntfy/server.yml:/etc/ntfy/server.yml'
    ports:
      - "127.0.0.1:8080:80"

  httpbin:
    container_name: ci_httpbin
    image: mccutchen/go-httpbin:2.23.1@sha256:90ac1702685468aa592938e65b2ba1b4757e0c006934a962ef7271a8717aaa3b
    ports:
      - "127.0.0.1:8081:8080"
